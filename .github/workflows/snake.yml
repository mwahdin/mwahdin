name: generate animation

on:
  # هر ۲۴ ساعت یک‌بار خودکار اجرا شود
  schedule:
    - cron: "0 */24 * * *" 
  
  # اجازه می‌دهد هر زمان خواستید دستی هم آن را اجرا کنید
  workflow_dispatch:
  
  # با هر بار پوش کردن روی شاخه اصلی اجرا شود
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # generates a snake game from a github user contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<user>/<repo>/<branch>/<file> , or as github page
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
